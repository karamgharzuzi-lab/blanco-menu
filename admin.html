<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAFAF7;--ink:#1A1A1A;--gold:#8B6914;--gold2:#C9A84C;--muted:#6B6B6B;--line:rgba(180,145,60,0.18);--card:#fff;--danger:#9c3b2e}
body{background:var(--bg);color:var(--ink);font-family:'Assistant',sans-serif;direction:rtl;text-align:right;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:24px 16px 80px}
h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.7rem;color:var(--gold);letter-spacing:.04em}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sub{color:var(--muted);font-size:.86rem;margin-bottom:22px}
.btn{font-family:'Assistant',sans-serif;font-weight:600;font-size:.86rem;border:1px solid var(--gold);background:var(--gold);color:#fff;border-radius:8px;padding:9px 16px;cursor:pointer;transition:.2s}
.btn:hover{opacity:.9}
.btn.ghost{background:transparent;color:var(--gold)}
.btn.del{background:transparent;border-color:rgba(156,59,46,.4);color:var(--danger)}
.btn.mini{padding:7px 11px;font-size:.95rem}
.btn:disabled{opacity:.5;cursor:default}
/* login */
.login{max-width:340px;margin:14vh auto 0;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px 26px;box-shadow:0 4px 24px rgba(0,0,0,.05)}
.login h1{text-align:center;margin-bottom:4px}
.login p{text-align:center;color:var(--muted);font-size:.84rem;margin-bottom:20px}
.field{display:block;width:100%;font-family:inherit;font-size:.95rem;padding:11px 13px;border:1px solid var(--line);border-radius:9px;margin-bottom:12px;background:#fff;color:var(--ink)}
.field:focus{outline:none;border-color:var(--gold2)}
.err{color:var(--danger);font-size:.82rem;min-height:18px;margin-bottom:6px;text-align:center}
.hidden{display:none!important}
/* editor */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.seedbox{background:#fff;border:1px dashed var(--gold2);border-radius:12px;padding:20px;text-align:center;margin-bottom:24px}
.seedbox p{color:var(--muted);font-size:.88rem;margin-bottom:12px}
.ed-section{margin-bottom:30px}
.ed-sec-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:14px}
.ed-sec-head h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.3rem;color:var(--gold)}
.ed-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px;margin-bottom:12px}
.ed-row{display:flex;gap:10px;margin-bottom:9px}
.ed-row .f-name{flex:1}
.ed-row .f-price{width:130px;flex-shrink:0}
.ed-card input,.ed-card textarea,.ed-card select{width:100%;font-family:inherit;font-size:.9rem;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.ed-card input:focus,.ed-card textarea:focus{outline:none;border-color:var(--gold2)}
.ed-card textarea{resize:vertical;min-height:54px;line-height:1.5;margin-bottom:9px}
.ed-card .f-note{margin-bottom:11px}
.ed-photo{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.thumb{width:64px;height:64px;border-radius:8px;flex-shrink:0;background:linear-gradient(145deg,#f2ead8,#e4d4b2) center/cover no-repeat;border:1px solid var(--line)}
.up-status{font-size:.8rem;color:var(--muted)}
.ed-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ed-actions .spacer{flex:1}
.note-hint{font-size:.74rem;color:var(--muted);margin-top:-4px;margin-bottom:9px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:9px;font-size:.86rem;opacity:0;pointer-events:none;transition:.3s;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

let dishes = [];
const $ = s => document.querySelector(s);
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function secTitle(k){ const s=SECTIONS.find(x=>x.key===k); return s?s.title:k; }

// ---- AUTH ----
$('#signInBtn').addEventListener('click', async ()=>{
  $('#loginErr').textContent='';
  try{ await signInWithEmailAndPassword(auth, $('#email').value.trim(), $('#password').value); }
  catch(e){ $('#loginErr').textContent = 'כניסה נכשלה — בדוק אימייל וסיסמה.'; }
});
$('#password').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#signInBtn').click(); });
$('#logoutBtn').addEventListener('click', ()=>signOut(auth));

onAuthStateChanged(auth, user=>{
  if(user){ $('#loginView').classList.add('hidden'); $('#adminView').classList.remove('hidden'); loadDishes(); }
  else{ $('#adminView').classList.add('hidden'); $('#loginView').classList.remove('hidden'); }
});

// ---- DATA ----
async function loadDishes(){
  const snap = await getDocs(collection(db,'dishes'));
  dishes = snap.docs.map(d=>({id:d.id, ...d.data()}));
  renderEditor();
}

function nextOrder(secKey){
  const arr = dishes.filter(d=>d.section===secKey);
  return arr.length ? Math.max(...arr.map(d=>d.order||0))+1 : 0;
}

async function seed(){
  const btn=$('#seedBtn'); btn.disabled=true; btn.textContent='טוען…';
  const batch = writeBatch(db);
  SEED.forEach(d=>{ batch.set(doc(collection(db,'dishes')), d); });
  await batch.commit();
  toast('התפריט נטען'); loadDishes();
}

async function addDish(secKey){
  await addDoc(collection(db,'dishes'), {section:secKey,name:'מנה חדשה',price:'',desc:'',note:'',photo:'',order:nextOrder(secKey)});
  toast('מנה נוספה'); await loadDishes();
}

async function saveDish(id, card){
  await updateDoc(doc(db,'dishes',id), {
    name: card.querySelector('.f-name').value.trim(),
    price: card.querySelector('.f-price').value.trim(),
    desc: card.querySelector('.f-desc').value.trim(),
    note: card.querySelector('.f-note').value.trim()
  });
  toast('נשמר');
  const d=dishes.find(x=>x.id===id);
  if(d){ d.name=card.querySelector('.f-name').value.trim(); d.price=card.querySelector('.f-price').value.trim(); d.desc=card.querySelector('.f-desc').value.trim(); d.note=card.querySelector('.f-note').value.trim(); }
}

async function delDish(id){
  if(!confirm('למחוק את המנה?')) return;
  await deleteDoc(doc(db,'dishes',id)); toast('נמחק'); await loadDishes();
}

async function uploadPhoto(id, file, card){
  const status=card.querySelector('.up-status'); status.textContent='מעלה…';
  try{
    const r = ref(storage, 'dishes/'+id+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-]/g,'_'));
    await uploadBytes(r, file);
    const url = await getDownloadURL(r);
    await updateDoc(doc(db,'dishes',id), {photo:url});
    card.querySelector('.thumb').style.backgroundImage = 'url("'+url+'")';
    const d=dishes.find(x=>x.id===id); if(d) d.photo=url;
    status.textContent='✓ הועלה';
  }catch(e){ console.error(e); status.textContent='שגיאה בהעלאה'; }
}

async function move(id, dir){
  const d=dishes.find(x=>x.id===id); if(!d) return;
  const sib = dishes.filter(x=>x.section===d.section).sort((a,b)=>(a.order||0)-(b.order||0));
  const i = sib.findIndex(x=>x.id===id); const j=i+dir;
  if(j<0||j>=sib.length) return;
  const a=sib[i], b=sib[j]; const ao=a.order||0, bo=b.order||0;
  const batch=writeBatch(db);
  batch.update(doc(db,'dishes',a.id),{order:bo});
  batch.update(doc(db,'dishes',b.id),{order:ao});
  await batch.commit(); await loadDishes();
}

// ---- RENDER ----
function cardEl(d){
  const el=document.createElement('div'); el.className='ed-card'; el.dataset.id=d.id;
  const bg = d.photo ? 'background-image:url(\''+esc(d.photo)+'\')' : '';
  el.innerHTML =
    '<div class="ed-row"><input class="f-name" value="'+esc(d.name)+'" placeholder="שם המנה"><input class="f-price" value="'+esc(d.price)+'" placeholder="מחיר ₪75"></div>'+
    '<textarea class="f-desc" placeholder="תיאור (אפשר להשאיר ריק)">'+esc(d.desc)+'</textarea>'+
    '<input class="f-note" value="'+esc(d.note)+'" placeholder="תוספת / הערה (אופציונלי)">'+
    '<div class="note-hint">לכמה הערות הפרד עם הסימן  |  · לכמה מחירים (גדול/קטן) הפרד עם  ·</div>'+
    '<div class="ed-photo"><div class="thumb" style="'+bg+'"></div>'+
      '<label class="btn ghost mini">תמונה<input type="file" accept="image/*" class="f-file" hidden></label>'+
      '<span class="up-status"></span></div>'+
    '<div class="ed-actions"><button class="btn save mini">שמירה</button>'+
      '<button class="btn ghost mini up">↑</button><button class="btn ghost mini down">↓</button>'+
      '<span class="spacer"></span><button class="btn del mini">מחיקה</button></div>';
  el.querySelector('.save').addEventListener('click',()=>saveDish(d.id, el));
  el.querySelector('.del').addEventListener('click',()=>delDish(d.id));
  el.querySelector('.up').addEventListener('click',()=>move(d.id,-1));
  el.querySelector('.down').addEventListener('click',()=>move(d.id,1));
  el.querySelector('.f-file').addEventListener('change',e=>{ if(e.target.files[0]) uploadPhoto(d.id, e.target.files[0], el); });
  return el;
}

function renderEditor(){
  const root=$('#editorRoot'); root.innerHTML='';
  if(!dishes.length){
    const box=document.createElement('div'); box.className='seedbox';
    box.innerHTML='<p>התפריט ריק. טען את 50 המנות הנוכחיות בלחיצה אחת כדי להתחיל.</p><button class="btn" id="seedBtn">טען את התפריט הנוכחי</button>';
    root.appendChild(box); $('#seedBtn').addEventListener('click',seed); return;
  }
  SECTIONS.forEach(sec=>{
    const arr=dishes.filter(d=>d.section===sec.key).sort((a,b)=>(a.order||0)-(b.order||0));
    const wrap=document.createElement('div'); wrap.className='ed-section';
    const head=document.createElement('div'); head.className='ed-sec-head';
    head.innerHTML='<h3>'+esc(sec.title)+'</h3><button class="btn ghost mini add">+ מנה</button>';
    head.querySelector('.add').addEventListener('click',()=>addDish(sec.key));
    wrap.appendChild(head);
    arr.forEach(d=>wrap.appendChild(cardEl(d)));
    root.appendChild(wrap);
  });
}
